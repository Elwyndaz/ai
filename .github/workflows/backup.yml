name: Backup votes
on:
  schedule:
    - cron: "0 3 * * *" # varje natt 03:00 UTC
  workflow_dispatch: # gör att den även kan köras manuellt från Actions-fliken

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch snapshot
        run: |
          mkdir -p backup
          curl -sf https://api.orgutveckling.se/votes -o backup/votes.json
          curl -sf https://api.orgutveckling.se/suggestions -o backup/suggestions.json
      - name: Commit if changed
        run: |
          git config user.name "vote-backup"
          git config user.email "actions@github.com"
          git add backup
          git diff --cached --quiet || git commit -m "Backup votes $(date -u +%F)"
          git push
